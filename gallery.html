<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri - Muhammad Faris Saputra</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        nav {
            background-color: #2c3e50;
            width: 100%;
            padding: 15px 0;
            text-align: center;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }
        .container {
            background: white;
            width: 90%;
            max-width: 900px;
            margin: 30px 0;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }
        h2 {
            color: #2c3e50;
            border-bottom: 3px solid #3498db;
            display: inline-block;
            padding-bottom: 5px;
        }
        /* PENGATURAN GRID FOTO */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .gallery-item {
            overflow: hidden;
            border-radius: 10px;
            border: 2px solid #ddd;
            transition: 0.3s;
        }
        .gallery-item img {
            width: 100%;
            height: 200px;
            object-fit: cover; /* Agar foto tidak gepeng */
            display: block;
        }
        .gallery-item:hover {
            transform: scale(1.05);
            border-color: #3498db;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Beranda</a>
        <a href="biodata.html">Biodata</a>
        <a href="gallery.html">Galeri</a>
        <a href="video.html">Video</a>
        <a href="formulir.html">Formulir</a>
    </nav>

    <div class="container">
        <h2>Galeri Tempat Tinggal Saya</h2>
        <div class="gallery-grid">
            <div class="gallery-item"><img src="Depan runah.jpg" alt="Foto 1"></div>
            <div class="gallery-item"><img src="Rak novel.jpg" alt="Foto 2"></div>
            <div class="gallery-item"><img src="Foto cabai belakang rumah.jpg" alt="Foto 3"></div>

        </div>
<div class="container">
    <a href="video.html" class="btn">video saya</a>
</div>
        
</body>
</html>

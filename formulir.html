<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Tugas 02 - SIM</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .card { background: white; max-width: 550px; margin: auto; padding: 25px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 20px; border-bottom: 2px solid #27ae60; padding-bottom: 10px; }
        h3 { color: #27ae60; font-size: 1.1rem; margin-top: 25px; border-left: 4px solid #27ae60; padding-left: 10px; }
        label { display: block; margin-top: 10px; font-weight: bold; font-size: 0.9rem; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        input:focus { border-color: #27ae60; outline: none; box-shadow: 0 0 5px rgba(39, 174, 96, 0.2); }
        .radio-group { background: #f9f9f9; padding: 10px; border-radius: 8px; margin: 10px 0; }
        .radio-group label { display: inline; margin-right: 20px; cursor: pointer; }
        button { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1rem; font-weight: bold; margin-top: 20px; transition: 0.3s; }
        button:hover { background: #219150; }
        button:disabled { background: #95a5a6; }
    </style>
</head>
<body>

<div class="card">
    <h2>Formulir Penyusunan (Tugas 02)</h2>
    <form id="formTugas">
        
        <h3>1. Data Demografi</h3>
        <label>Nama Pengguna</label>
        <input type="text" name="Nama" placeholder="Masukkan Nama Lengkap" required>
        
        <label>Tanggal Lahir</label>
        <input type="date" name="Tanggal_Lahir" required>
        
        <label>Alamat</label>
        <textarea name="Alamat" rows="3" placeholder="Alamat Lengkap"></textarea>
        
        <label>No Telepon</label>
        <input type="tel" name="Telepon" placeholder="0812xxxx">
        
        <label>Email</label>
        <input type="email" name="Email" placeholder="contoh@mail.com">
        
        <label>Pendidikan (Dropdown)</label>
        <select name="Pendidikan">
            <option value="">-- Pilih Tingkat Pendidikan --</option>
            <option value="SMA">SMA/Sederajat</option>
            <option value="D3">Diploma (D3)</option>
            <option value="S1">Sarjana (S1)</option>
            <option value="S2">Magister (S2)</option>
        </select>

        <h3>2. Data Bank</h3>
        <label>Nama Bank</label>
        <select name="Bank">
            <option value="">-- Pilih Jenis Bank --</option>
            <option value="BRI">BRI</option>
            <option value="BCA">BCA</option>
            <option value="BNI">BNI</option>
            <option value="Mandiri">Mandiri</option>
            <option value="BSI">BSI</option>
        </select>
        
        <label>Nomor Rekening</label>
        <input type="text" name="Rekening" placeholder="Masukkan No. Rekening">

        <h3>3. Data Transaksi</h3>
        <label>Tanggal Transaksi</label>
        <input type="date" name="Tgl_Transaksi">
        
        <label>Uraian Transaksi</label>
        <input type="text" name="Uraian" placeholder="Keterangan Transaksi">
        
        <label>Jenis Transaksi (Button)</label>
        <div class="radio-group">
            <input type="radio" name="Jenis" value="Debet" id="dbt" required> <label for="dbt">Debet</label>
            <input type="radio" name="Jenis" value="Kredit" id="krd"> <label for="krd">Kredit</label>
        </div>
            <div class="container">
            <a href="index.html" class="btn">Kembali ke Halaman Utama</a>
        </div>

        <button type="submit" id="btnSubmit">Simpan ke Database</button>
    </form>
</div>

<script>
    // URL Web App Google Apps Script kamu
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzc-yR-1EALPHAwqXUXBIdL7biDSaEVlfqHIe5BdIf-SpujnWv6CsOB-KkAhMKGxeDk/exec';
    const form = document.getElementById('formTugas');
    const btnSubmit = document.getElementById('btnSubmit');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btnSubmit.disabled = true;
        btnSubmit.innerHTML = "Sedang Mengirim...";

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                alert("Berhasil! Data Anda telah tersimpan di Google Sheets.");
                form.reset();
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = "Simpan ke Database";
            })
            .catch(error => {
                console.error('Error!', error.message);
                alert("Gagal mengirim data. Coba cek koneksi atau pengaturan Deploy.");
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = "Simpan ke Database";
            });
    });
</script>

</body>
</html>
